services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  reporting-api:
    build: { context: ., target: api }
    ports: ["4000:4000"]
    environment:
      PORT: 4000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  gateway:
    build: { context: ., target: api }
    command: ["node", "gateway/index.js"]
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      GATEWAY_PORT: 8080
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      RESORT_SERVICE_URL: http://reporting-api:4000
    depends_on: [reporting-api]

  payment-worker:
    build: { context: ., target: api }
    command: ["node", "queues/paymentPosting.queue.js"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  notification-worker:
    build: { context: ., target: api }
    command: ["node", "queues/notification.queue.js"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  pdf-report-worker:
    build: { context: ., target: api }
    command: ["node", "queues/pdfReport.queue.js"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  iam-service:
    build: { context: ., target: api }
    command: ["node", "iam-service/index.js"]
    ports: ["4100:4100"]
    environment:
      IAM_PORT: 4100
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}

  frontend:
    build: { context: ., target: build }
    command: ["npx", "vite", "preview", "--host", "0.0.0.0", "--port", "5173"]
    ports: ["5173:5173"]
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on: [gateway]
