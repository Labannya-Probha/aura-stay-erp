services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  reporting-api:
    build: { context: ., target: api }
    ports: ["4000:4000"]
    profiles: ["core", "observability"]
    environment:
      PORT: 4000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: aura-stay-reporting-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      redis: { condition: service_healthy }

  gateway:
    build: { context: ., target: api }
    command: ["node", "gateway/index.js"]
    ports: ["8080:8080"]
    profiles: ["core", "observability"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      GATEWAY_PORT: 8080
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      RESORT_SERVICE_URL: http://reporting-api:4000
    depends_on: [reporting-api]

  payment-worker:
    build: { context: ., target: api }
    command: ["node", "queues/paymentPosting.queue.js"]
    profiles: ["core", "observability"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  notification-worker:
    build: { context: ., target: api }
    command: ["node", "queues/notification.queue.js"]
    profiles: ["core", "observability"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  pdf-report-worker:
    build: { context: ., target: api }
    command: ["node", "queues/pdfReport.queue.js"]
    profiles: ["core", "observability"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  iam-service:
    build: { context: ., target: api }
    command: ["node", "iam-service/index.js"]
    ports: ["4100:4100"]
    profiles: ["core", "observability"]
    environment:
      IAM_PORT: 4100
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}


  frontend:
    build: { context: ., target: build }
    command: ["npx", "vite", "preview", "--host", "0.0.0.0", "--port", "5173"]
    ports: ["5173:5173"]
    profiles: ["core", "observability"]
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on: [gateway]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.132.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.7.1
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./ops/observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.2.1
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - loki
